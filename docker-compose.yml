# Full stack: `docker compose up --build` → LocalStack (SQS) + API.
# SQS consumer: `docker compose --profile worker up --build`
# MongoDB Atlas: set MONGO_URI in `.env` (omit local `mongo` — default image does not run it).
# Optional local Mongo: `docker compose --profile local-mongo up`
#
# In containers, LocalStack is reached as `http://localstack:4566` (overridden below).
services:
  mongo:
    profiles: ["local-mongo"]
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - watchtower

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEBUG: "0"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - watchtower
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  sqs-init:
    image: amazon/aws-cli:2.32.19
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: eu-west-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for q in watchtower-ingress watchtower-ingress-dlq; do
          aws --endpoint-url=http://localstack:4566 sqs create-queue --queue-name "$$q" || true
        done
    networks:
      - watchtower
    restart: "no"

  api:
    build: .
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: .env
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
      sqs-init:
        condition: service_completed_successfully
    networks:
      - watchtower

  worker:
    profiles: ["worker"]
    build: .
    command: ["ais-worker"]
    env_file: .env
    environment:
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      localstack:
        condition: service_healthy
      sqs-init:
        condition: service_completed_successfully
    networks:
      - watchtower

volumes:
  mongo_data:
  localstack_data:

networks:
  watchtower:
    driver: bridge
